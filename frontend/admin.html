<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="logo.png" type="image/png">
  <title>MoryTory Admin – Quản lý đơn hàng</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --cream:   #fdf8f4;
      --blush:   #f5ede6;
      --brown:   #7a4a1e;
      --brown-d: #5c3510;
      --brown-l: #c9a882;
      --text:    #3a2010;
      --sans:    'Outfit', sans-serif;
      --serif:   'Playfair Display', serif;
    }

    body {
      background: var(--cream);
      color: var(--text);
      font-family: var(--sans);
      padding: 40px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      border-bottom: 0.5px solid #e8ddd4;
      padding-bottom: 20px;
    }
    .header h1 {
      font-family: var(--serif);
      font-size: 28px;
      color: var(--brown-d);
    }
    .btn-refresh {
      background: var(--brown);
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.15s;
    }
    .btn-refresh:hover {
      background: var(--brown-d);
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: #fff;
      border: 0.5px solid #e8ddd4;
      border-radius: 12px;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      background: var(--blush);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: var(--brown);
    }
    .stat-value {
      font-size: 24px;
      font-weight: 600;
      color: var(--brown-d);
    }
    .stat-label {
      font-size: 12px;
      color: #888780;
    }

    /* Orders List */
    .orders-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .order-card {
      background: #fff;
      border: 0.5px solid #e8ddd4;
      border-radius: 16px;
      padding: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      box-shadow: 0 4px 12px rgba(122,74,30,0.03);
      transition: transform 0.2s;
    }
    .order-card:hover {
      transform: translateY(-2px);
    }

    .order-main-info {
      flex: 2;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .order-id-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }
    .order-id {
      font-size: 16px;
      font-weight: 600;
      color: var(--brown-d);
    }
    .order-date {
      font-size: 12px;
      color: #888780;
    }
    .badge {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .badge-cod {
      background: #faeeda;
      color: #633806;
    }
    .badge-bank {
      background: #e3f2fd;
      color: #0d47a1;
    }

    .customer-details {
      background: var(--cream);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 13px;
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 6px 12px;
    }
    .detail-label {
      color: #888780;
    }
    .detail-val {
      font-weight: 500;
    }

    .order-items-info {
      flex: 1.5;
      min-width: 250px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      justify-content: center;
    }
    .item-theme {
      font-size: 15px;
      font-weight: 600;
      color: var(--brown);
    }
    .item-qty-price {
      font-size: 13px;
      color: #888780;
    }
    .total-price-box {
      margin-top: 10px;
      font-size: 18px;
      font-weight: 600;
      color: var(--brown-d);
    }

    .order-preview-sec {
      flex: 1.2;
      min-width: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .preview-box {
      width: 140px;
      height: 140px;
      border-radius: 12px;
      border: 1px solid #e8ddd4;
      background: #fdf8f4;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .preview-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .preview-placeholder {
      font-size: 24px;
      color: var(--brown-l);
    }
    .btn-download {
      background: var(--blush);
      color: var(--brown);
      border: 1px solid var(--brown-l);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all 0.15s;
      text-decoration: none;
    }
    .btn-download:hover {
      background: var(--brown);
      color: #fff;
    }

    /* Loading overlay */
    .loader {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 60px 0;
      flex-direction: column;
      gap: 12px;
      color: var(--brown);
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e8ddd4;
      border-top: 4px solid var(--brown);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* No orders screen */
    .no-orders {
      text-align: center;
      padding: 80px 20px;
      background: #fff;
      border-radius: 16px;
      border: 0.5px solid #e8ddd4;
    }
    .no-orders-icon {
      font-size: 48px;
      color: var(--brown-l);
    }
    @media (max-width: 768px) {
      body { padding: 20px 10px; }
      .header { flex-direction: column; align-items: flex-start; gap: 16px; }
      .stats-grid { grid-template-columns: 1fr; }
      .order-card { flex-direction: column; }
      .order-main-info, .order-items-info, .order-preview-sec { width: 100%; min-width: unset; }
      .customer-details { grid-template-columns: 80px 1fr; }
      .preview-box { width: 100%; height: 200px; }
      #login-overlay > div { margin: 15px; padding: 30px 20px; }
    }
  </style>
</head>
<body>
  <!-- Login Modal Overlay -->
  <div id="login-overlay" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(122, 74, 30, 0.25); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.3s ease;">
    <div style="background: #fff; border: 1px solid #e8ddd4; border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(122,74,30,0.15); text-align: center; display: flex; flex-direction: column; gap: 24px;">
      <div>
        <h2 style="font-family: var(--serif); color: var(--brown-d); margin-bottom: 8px; font-size: 26px;">Đăng nhập Admin</h2>
        <p style="font-size: 13px; color: #888780;">Vui lòng nhập mật khẩu quản trị để tiếp tục</p>
      </div>
      <div style="display: flex; flex-direction: column; gap: 8px; text-align: left;">
        <label for="admin-password" style="font-size: 12px; font-weight: 500; color: var(--brown);">Mật khẩu</label>
        <input type="password" id="admin-password" placeholder="Nhập mật khẩu..." style="width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid #e8ddd4; font-size: 14px; font-family: var(--sans); outline: none; transition: border-color 0.2s;" onkeydown="if(event.key==='Enter') submitLogin()" />
        <span id="login-error" style="color: #d32f2f; font-size: 12px; display: none; margin-top: 4px;"><i class="ti ti-alert-circle"></i> Mật khẩu không chính xác</span>
      </div>
      <button onclick="submitLogin()" style="background: var(--brown); color: #fff; border: none; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.2s;">
        Xác nhận đăng nhập
      </button>
    </div>
  </div>

  <div class="container">
    <!-- Header -->
    <div class="header">
      <div>
        <h1>Quản lý đơn hàng MoryTory</h1>
        <p style="font-size: 13px; color: #888780; margin-top: 4px;">Xem danh sách và tải ảnh composite khách hàng tự thiết kế</p>
      </div>
      <div style="display: flex; gap: 12px;">
        <button class="btn-refresh" onclick="fetchOrders()">
          <i class="ti ti-refresh"></i> Tải lại danh sách
        </button>
        <button class="btn-refresh" onclick="logoutAdmin()" style="background: transparent; color: var(--brown); border: 1.5px solid var(--brown);">
          <i class="ti ti-logout"></i> Đăng xuất
        </button>
      </div>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon"><i class="ti ti-receipt"></i></div>
        <div>
          <div class="stat-value" id="stat-total-orders">0</div>
          <div class="stat-label">Tổng đơn hàng</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><i class="ti ti-cash"></i></div>
        <div>
          <div class="stat-value" id="stat-revenue">0 đ</div>
          <div class="stat-label">Tổng doanh thu</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><i class="ti ti-credit-card"></i></div>
        <div>
          <div class="stat-value" id="stat-bank-orders">0</div>
          <div class="stat-label">Thanh toán chuyển khoản</div>
        </div>
      </div>
    </div>

    <!-- Orders container -->
    <div id="orders-container">
      <div class="loader">
        <div class="spinner"></div>
        <div>Đang tải danh sách đơn hàng...</div>
      </div>
    </div>
  </div>

  <script>
    const isLocal = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
    // Tự động phân giải đường dẫn API cục bộ hoặc sản xuất
    const ADMIN_API_URL = "https://morytory-ai-worker.morytory.workers.dev/api/admin/orders";

    function showLoginOverlay(errorMsg = "") {
      document.getElementById('login-overlay').style.display = 'flex';
      const errorSpan = document.getElementById('login-error');
      if (errorMsg) {
        errorSpan.textContent = errorMsg;
        errorSpan.style.display = 'block';
      } else {
        errorSpan.style.display = 'none';
      }
      document.getElementById('admin-password').value = '';
      document.getElementById('admin-password').focus();
    }

    function hideLoginOverlay() {
      document.getElementById('login-overlay').style.display = 'none';
    }

    function logoutAdmin() {
      localStorage.removeItem('admin_password');
      showLoginOverlay();
    }

    async function submitLogin() {
      const password = document.getElementById('admin-password').value;
      const errorSpan = document.getElementById('login-error');
      errorSpan.style.display = 'none';

      if (!password) {
        errorSpan.textContent = "Vui lòng nhập mật khẩu";
        errorSpan.style.display = 'block';
        return;
      }

      const btn = document.querySelector('#login-overlay button');
      const originalText = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = `<i class="ti ti-loader" style="animation: spin 1s linear infinite; display: inline-block;"></i> Đang xác thực...`;

      try {
        const res = await fetch(ADMIN_API_URL, {
          headers: {
            "Authorization": `Bearer ${password}`
          }
        });

        if (res.status === 401) {
          errorSpan.textContent = "Mật khẩu không chính xác";
          errorSpan.style.display = 'block';
        } else if (!res.ok) {
          errorSpan.textContent = "Lỗi kết nối server: " + res.status;
          errorSpan.style.display = 'block';
        } else {
          localStorage.setItem('admin_password', password);
          hideLoginOverlay();
          const data = await res.json();
          renderOrders(data.orders);
          updateStats(data.orders);
        }
      } catch (err) {
        errorSpan.textContent = "Lỗi: " + err.message;
        errorSpan.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.innerHTML = originalText;
      }
    }

    async function fetchOrders() {
      const password = localStorage.getItem('admin_password');
      if (!password) {
        showLoginOverlay();
        return;
      }

      const container = document.getElementById('orders-container');
      container.innerHTML = `
        <div class="loader">
          <div class="spinner"></div>
          <div>Đang cập nhật danh sách...</div>
        </div>
      `;

      try {
        const res = await fetch(ADMIN_API_URL, {
          headers: {
            "Authorization": `Bearer ${password}`
          }
        });
        if (res.status === 401) {
          localStorage.removeItem('admin_password');
          showLoginOverlay("Mật khẩu phiên làm việc đã hết hạn hoặc không đúng.");
          return;
        }
        if (!res.ok) throw new Error("Không thể kết nối đến server");
        
        const data = await res.json();
        if (!data || !data.success || !data.orders) {
          throw new Error("Dữ liệu đơn hàng không hợp lệ");
        }

        hideLoginOverlay();
        renderOrders(data.orders);
        updateStats(data.orders);
      } catch (err) {
        console.error(err);
        container.innerHTML = `
          <div class="no-orders" style="border-color: #e57373; background: #ffebee;">
            <div class="no-orders-icon" style="color: #d32f2f;"><i class="ti ti-alert-triangle"></i></div>
            <h3 style="color: #d32f2f; margin-bottom: 8px;">Đã xảy ra lỗi khi tải dữ liệu</h3>
            <p style="font-size: 13px; color: #c62828;">Chi tiết: ${err.message}</p>
          </div>
        `;
      }
    }

    async function updateOrderStatus(orderId, newStatus) {
      const password = localStorage.getItem('admin_password');
      if (!password) {
        showLoginOverlay();
        return;
      }

      const savingSpan = document.getElementById(`saving-${orderId}`);
      if (savingSpan) {
        savingSpan.style.display = 'inline-flex';
        savingSpan.innerHTML = `<i class="ti ti-loader" style="animation: spin 1s linear infinite; display: inline-block; margin-right: 4px;"></i> Đang lưu...`;
        savingSpan.style.color = 'var(--brown-l)';
      }

      const updateApiUrl = "https://morytory-ai-worker.morytory.workers.dev/api/admin/orders/update-status";

      try {
        const res = await fetch(updateApiUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${password}`
          },
          body: JSON.stringify({ orderId, status: newStatus })
        });

        if (res.status === 401) {
          localStorage.removeItem('admin_password');
          showLoginOverlay("Phiên làm việc hết hạn. Vui lòng đăng nhập lại.");
          return;
        }

        if (!res.ok) throw new Error("Lỗi cập nhật trạng thái");

        const data = await res.json();
        if (data.success) {
          if (savingSpan) {
            savingSpan.innerHTML = `<i class="ti ti-circle-check" style="margin-right: 4px;"></i> Đã lưu`;
            savingSpan.style.color = '#2e7d32';
            setTimeout(() => {
              savingSpan.style.display = 'none';
            }, 2000);
          }
        } else {
          throw new Error(data.error || "Không thành công");
        }
      } catch (err) {
        console.error(err);
        if (savingSpan) {
          savingSpan.innerHTML = `<i class="ti ti-circle-x" style="margin-right: 4px;"></i> Lỗi: ${err.message}`;
          savingSpan.style.color = '#d32f2f';
        }
      }
    }

    function getThemeFallbackImage(theme) {
      if (theme === "Sinh nhật gia đình") return "./birthday_base.jpg";
      if (theme === "Tốt nghiệp") return "./graduation_base.jpg";
      if (theme === "Đám cưới") return "./wedding_base.jpg";
      return "./logo.png";
    }

    function renderOrders(orders) {
      const container = document.getElementById('orders-container');
      
      if (orders.length === 0) {
        container.innerHTML = `
          <div class="no-orders">
            <div class="no-orders-icon"><i class="ti ti-inbox-x"></i></div>
            <h3 style="margin-bottom: 6px;">Chưa có đơn hàng nào</h3>
            <p style="font-size: 13px; color: #888780;">Các đơn đặt hàng mới từ khách hàng sẽ xuất hiện tại đây.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = "";
      orders.forEach(order => {
        const dateStr = new Date(order.createdAt).toLocaleString('vi-VN', {
          hour: '2-digit', minute: '2-digit',
          day: '2-digit', month: '2-digit', year: 'numeric'
        });

        const payBadgeClass = order.paymentMethod === 'COD' ? 'badge-cod' : 'badge-bank';
        const payMethodLabel = order.paymentMethod === 'COD' ? 'Thanh toán COD' : 'VietQR Bank';

        // Lấy danh sách sản phẩm (hỗ trợ tương thích ngược)
        const items = order.items || [{
          title: order.theme && order.theme.includes('Mô hình') ? order.theme : `Mô hình Gia Đình`,
          theme: order.theme || "",
          quantity: order.quantity || 1,
          unitPrice: order.unitPrice || order.totalPrice,
          compositePreview: order.compositePreview || ""
        }];

        let itemsHtml = "";
        items.forEach(item => {
          const displayTitle = item.title;
          const displayTheme = item.theme ? `Chủ đề: ${item.theme}` : "";
          const previewImg = item.compositePreview || (item.theme ? getThemeFallbackImage(item.theme) : "./logo.png");
          
          itemsHtml += `
            <div style="display: flex; align-items: center; justify-content: space-between; gap: 14px; padding-bottom: 12px; border-bottom: 0.5px solid #f5ede6; width: 100%;">
              <div style="display: flex; align-items: center; gap: 12px; flex-grow: 1; min-width: 0;">
                <div style="width: 50px; height: 50px; border-radius: 8px; border: 0.5px solid #e8ddd4; overflow: hidden; background: var(--cream); flex-shrink: 0; display: flex; align-items: center; justify-content: center;">
                  <img src="${previewImg}" style="width: 100%; height: 100%; object-fit: cover;" onerror="this.src='./logo.png'" />
                </div>
                <div style="min-width: 0; text-align: left;">
                  <div style="font-size: 13px; font-weight: 600; color: var(--brown); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${displayTitle}">${displayTitle}</div>
                  <div style="font-size: 11px; color: #888780;">${displayTheme ? displayTheme + ' | ' : ''}SL: ${item.quantity}</div>
                </div>
              </div>
              <div style="text-align: right; flex-shrink: 0;">
                <div style="font-size: 13px; font-weight: 500; color: var(--text);">${(item.unitPrice * item.quantity).toLocaleString('vi-VN')} đ</div>
                ${item.compositePreview ? `
                  <a href="${item.compositePreview}" download="MoryTory_${order.id}.png" target="_blank" style="font-size: 10px; color: var(--brown); text-decoration: underline; display: inline-flex; align-items: center; gap: 2px; margin-top: 2px;">
                    <i class="ti ti-download"></i> Tải ảnh AI
                  </a>
                ` : '<span style="font-size: 10px; color: #b4b2a9;">Làm sẵn</span>'}
              </div>
            </div>
          `;
        });

        const cardHtml = `
          <div class="order-card">
            <!-- Cột trái: Thông tin khách hàng & Mã đơn -->
            <div class="order-main-info">
              <div class="order-id-row">
                <span class="order-id">${order.id}</span>
                <span class="badge ${payBadgeClass}">${payMethodLabel}</span>
              </div>
              <div class="order-date"><i class="ti ti-calendar" style="margin-right: 4px;"></i> ${dateStr}</div>
              
              <div class="customer-details">
                <span class="detail-label">Người nhận:</span>
                <span class="detail-val">${order.customerName}</span>
                <span class="detail-label">SĐT:</span>
                <span class="detail-val">${order.customerPhone}</span>
                <span class="detail-label">Địa chỉ:</span>
                <span class="detail-val">${order.customerAddress}</span>
              </div>
              
              <div style="display: flex; align-items: center; gap: 8px; margin-top: 8px;">
                <span style="font-size: 13px; color: #888780;">Trạng thái:</span>
                <select onchange="updateOrderStatus('${order.id}', this.value)" style="padding: 4px 8px; border-radius: 6px; border: 1px solid var(--brown-l); background: #fff; font-size: 13px; font-family: var(--sans); color: var(--brown); font-weight: 500; cursor: pointer; outline: none; transition: border-color 0.2s;">
                  <option value="Awaiting Payment" ${order.status === 'Awaiting Payment' ? 'selected' : ''}>Chờ thanh toán</option>
                  <option value="Pending" ${order.status === 'Pending' ? 'selected' : ''}>Đang chờ xử lý</option>
                  <option value="Processing" ${order.status === 'Processing' ? 'selected' : ''}>Đang chế tác</option>
                  <option value="Shipping" ${order.status === 'Shipping' ? 'selected' : ''}>Đang giao hàng</option>
                  <option value="Completed" ${order.status === 'Completed' ? 'selected' : ''}>Đã hoàn thành</option>
                  <option value="Cancelled" ${order.status === 'Cancelled' ? 'selected' : ''}>Đã hủy</option>
                </select>
                <span id="saving-${order.id}" style="font-size: 11px; color: #2e7d32; display: none;"></span>
              </div>
            </div>

            <!-- Cột phải: Chi tiết sản phẩm & Giá trị -->
            <div style="flex: 2.7; min-width: 320px; display: flex; flex-direction: column; gap: 14px;">
              <div style="font-size: 12px; font-weight: 600; color: #888780; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 0.5px solid #e8ddd4; padding-bottom: 6px; text-align: left;">Sản phẩm trong đơn</div>
              <div style="display: flex; flex-direction: column; gap: 12px;">
                ${itemsHtml}
              </div>
              <div style="display: flex; justify-content: space-between; align-items: baseline; border-top: 0.5px dashed #e8ddd4; padding-top: 10px; margin-top: 4px;">
                <span style="font-size: 13px; color: #888780;">Tổng tiền thanh toán:</span>
                <strong style="font-size: 18px; color: var(--brown-d);">${order.totalPrice.toLocaleString('vi-VN')} đ</strong>
              </div>
            </div>
          </div>
        `;
        container.insertAdjacentHTML('beforeend', cardHtml);
      });
    }

    function updateStats(orders) {
      document.getElementById('stat-total-orders').textContent = orders.length;
      
      const totalRevenue = orders.reduce((sum, order) => sum + order.totalPrice, 0);
      document.getElementById('stat-revenue').textContent = totalRevenue.toLocaleString('vi-VN') + ' đ';

      const bankOrders = orders.filter(order => order.paymentMethod === 'BANK').length;
      document.getElementById('stat-bank-orders').textContent = bankOrders;
    }

    // Tự động tải danh sách khi mở trang
    window.onload = fetchOrders;
  </script>
</body>
</html>
